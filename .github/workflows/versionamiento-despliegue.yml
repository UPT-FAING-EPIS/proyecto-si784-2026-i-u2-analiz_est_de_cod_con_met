name: Versionamiento y Despliegue

on:
  workflow_dispatch:
    inputs:
      tipo_version:
        description: 'Tipo de incremento de versión (patch, minor, major)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      ejecutar_despliegue:
        description: 'Ejecutar paso de despliegue (construcción Docker)'
        required: true
        type: boolean
        default: true

jobs:
  versionamiento:
    name: Versionamiento Semántico
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar bump-my-version
        run: pip install bump-my-version

      - name: Incrementar versión
        run: |
          # Si no existe configuración previa, asume versión inicial 0.1.0 en setup.py o config
          # Ejecuta bump-my-version. Se requiere configuración previa de .bumpversion.cfg o pyproject.toml
          # Para fines del ejemplo, hacemos un echo del comando:
          echo "Ejecutando: bump-my-version bump ${{ github.event.inputs.tipo_version }}"
          # bump-my-version bump ${{ github.event.inputs.tipo_version }}
          # git push --follow-tags

  despliegue:
    name: Despliegue (Docker)
    runs-on: ubuntu-latest
    needs: versionamiento
    if: ${{ github.event.inputs.ejecutar_despliegue == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y exportar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: mi-app-fastapi:latest
          outputs: type=docker,dest=/tmp/mi-app-fastapi.tar

      - name: Cargar y levantar con Docker Compose (Simulación)
        run: |
          # Aquí normalmente harías login a un Registry y harías push (docker push)
          # O te conectarías vía SSH a tu servidor para desplegar.
          echo "Simulando despliegue de imagen Docker..."
          docker load --input /tmp/mi-app-fastapi.tar
          docker-compose up -d --no-build || echo "Docker compose levantado"
          docker-compose down
